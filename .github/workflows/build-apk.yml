name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Provision a known-good Android SDK + NDK + CMake (see build-aab.yml
      # for the reason this is needed).
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "11076708"
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973 cmake;3.22.1"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .github/flutter-version

      - name: Clean stale build artifacts
        working-directory: flutter_app
        run: |
          rm -rf .dart_tool build
          rm -rf android/.gradle android/build android/app/build

      - name: Ensure INTERNET permission and browser queries
        working-directory: flutter_app
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<manifest /a\    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"
          fi
          if ! grep -q "android.permission.WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            sed -i '/<manifest /a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>' "$MANIFEST"
          fi
          if ! grep -q "<queries>" "$MANIFEST"; then
            sed -i '/<\/manifest>/i\    <queries>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="https" />\n        </intent>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="http" />\n        </intent>\n    </queries>' "$MANIFEST"
          fi

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate app icon
        working-directory: flutter_app
        run: dart run flutter_launcher_icons

      - name: Set app display name to Tamiva
        working-directory: flutter_app
        run: |
          sed -i 's/android:label="[^"]*"/android:label="Tamiva"/' android/app/src/main/AndroidManifest.xml

      - name: Build with Gradle
        working-directory: flutter_app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            --no-daemon \
            --console=plain \
            --warning-mode=summary \
            2>&1 | tee gradle-build.log
          status=${PIPESTATUS[0]}
          echo "::notice::Gradle exit status: $status"
          if [ "$status" -ne 0 ]; then
            echo "===== FAILURE TAIL (last 200 lines of gradle-build.log) ====="
            tail -n 200 gradle-build.log
            echo "===== END FAILURE TAIL ====="
          fi
          exit "$status"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tamiva-app-release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Gradle Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: flutter_app/android/gradle-build.log
          if-no-files-found: ignore