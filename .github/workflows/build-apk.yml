name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # required so we can push the version tag back to origin

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Full history needed so we can enumerate vN.M.K tags. Default
          # shallow clone would miss tags pointing at older commits.
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Provision a known-good Android SDK + NDK + CMake. The preinstalled
      # SDK on ubuntu-latest runners is missing ninja under cmake/3.22.1,
      # which causes :jni:externalNativeBuildCleanRelease to fail.
      #
      # `packages:` MUST be a single-line, space-separated string. YAML
      # block scalars (`|`) preserve newlines and cause sdkmanager to
      # interpret the whole block as one package name.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "11076708"
          packages: "platform-tools platforms;android-35 build-tools;35.0.0 ndk;27.0.12077973 cmake;3.22.1"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .github/flutter-version

      # Compute the next versionCode / versionName from the highest
      # existing vN.M.K tag. Same logic as build-aab.yml — both
      # workflows share the tag namespace, so a build pushed via
      # either workflow will advance the counter for the other.
      - name: Compute Next Version
        id: version
        working-directory: ${{ github.workspace }}
        run: |
          chmod +x .github/scripts/next-version.sh
          eval "$(./.github/scripts/next-version.sh)"
          echo "tag=${tag}"             >> "$GITHUB_OUTPUT"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}"             >> "$GITHUB_ENV"
          echo "version_name=${version_name}" >> "$GITHUB_ENV"
          echo "version_code=${version_code}" >> "$GITHUB_ENV"
          echo "Computed next version: tag=${tag} version_name=${version_name} version_code=${version_code}"

      # Note: tag collision handling lives in "Push Version Tag" below.
      # We deliberately do NOT pre-flight check the tag here — two
      # parallel runs starting from the same seed tag will both see
      # "available" until one of them pushes, which makes a pre-flight
      # check useless. The push step now retries with the next version.

      - name: Clean stale build artifacts
        working-directory: flutter_app
        run: |
          rm -rf .dart_tool build
          rm -rf android/.gradle android/build android/app/build

      - name: Ensure INTERNET permission and browser queries
        working-directory: flutter_app
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<manifest /a\    <uses-permission android:name="android.permission.INTERNET"/>' "$MANIFEST"
          fi
          if ! grep -q "android.permission.WRITE_EXTERNAL_STORAGE" "$MANIFEST"; then
            sed -i '/<manifest /a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>' "$MANIFEST"
          fi
          if ! grep -q "<queries>" "$MANIFEST"; then
            sed -i '/<\/manifest>/i\    <queries>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="https" />\n        </intent>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="http" />\n        </intent>\n    </queries>' "$MANIFEST"
          fi

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate app icon
        working-directory: flutter_app
        run: dart run flutter_launcher_icons

      - name: Set app display name to Tamiva
        working-directory: flutter_app
        run: |
          sed -i 's/android:label="[^"]*"/android:label="Tamiva"/' android/app/src/main/AndroidManifest.xml

      # `flutter build apk --build-name=X --build-number=Y` is the only
      # path that gets the tag-derived version into the APK without
      # committing a version bump to source control. Running
      # `./gradlew assembleRelease` directly would ignore --build-name
      # and emit whatever pubspec.yaml says.
      - name: Build APK
        working-directory: flutter_app
        run: |
          flutter build apk \
            --release \
            --build-name="${VERSION_NAME}" \
            --build-number="${VERSION_CODE}" \
            --no-tree-shake-icons \
            2>&1 | tee flutter-build.log
          status=${PIPESTATUS[0]}
          echo "::notice::Flutter exit status: $status"
          if [ "$status" -ne 0 ]; then
            echo "===== FAILURE TAIL (last 200 lines of flutter-build.log) ====="
            tail -n 200 flutter-build.log
            echo "===== END FAILURE TAIL ====="
          fi
          exit "$status"
        env:
          VERSION_NAME: ${{ env.version_name }}
          VERSION_CODE: ${{ env.version_code }}

      - name: Verify APK Exists
        working-directory: flutter_app
        run: |
          set -e
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [[ ! -f "$APK_PATH" ]]; then
            echo "::error::Expected APK not found at $APK_PATH"
            exit 1
          fi
          echo "APK size: $(du -h "$APK_PATH" | cut -f1)"
          echo "versionName=$VERSION_NAME versionCode=$VERSION_CODE"

      - name: Push Version Tag
        # Tag this commit with vN.M.K so future builds can derive their
        # version from it. Uses the workflow's GITHUB_TOKEN, which has
        # permission to push tags to the same repo.
        #
        # Race handling: if a parallel run already pushed this tag while
        # we were building, re-fetch tags and re-run next-version.sh to
        # find the next free tag, then push that. Up to 5 attempts before
        # giving up (which would mean CI is overwhelmed).
        #
        # This is also why we don't pre-flight check the tag — see the
        # note above the deleted Check Tag is Available step.
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          ATTEMPT=0
          MAX_ATTEMPTS=5
          CURRENT_TAG="${TAG}"
          CURRENT_NAME="${VERSION_NAME}"
          CURRENT_CODE="${VERSION_CODE}"

          while [ "$ATTEMPT" -lt "$MAX_ATTEMPTS" ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT: trying to push tag $CURRENT_TAG"

            # Re-fetch tags so we see anything pushed by parallel runs
            # since our initial checkout. Without this we'd cache an
            # outdated view of origin and miss the collision.
            git fetch --tags --force --prune origin >/dev/null 2>&1 || true

            # Try to create and push. Suppress only the "already exists"
            # stderr so the real cause of other failures isn't buried.
            git tag -a "${CURRENT_TAG}" \
                    -m "Build ${CURRENT_TAG}: versionName=${CURRENT_NAME} versionCode=${CURRENT_CODE}" 2>&1 \
              | grep -v "already exists" || true

            if git push origin "${CURRENT_TAG}" 2>&1 | tee push.log | grep -q "rejected\|already exists"; then
              echo "::warning::Tag $CURRENT_TAG already exists on origin. Computing the next version."
              rm -f push.log
              eval "$(./.github/scripts/next-version.sh)"
              CURRENT_TAG="${tag}"
              CURRENT_NAME="${version_name}"
              CURRENT_CODE="${version_code}"
              echo "  retried with tag=$CURRENT_TAG version_name=$CURRENT_NAME version_code=$CURRENT_CODE"
              continue
            fi

            rm -f push.log
            echo "::notice::Pushed tag $CURRENT_TAG (versionName=$CURRENT_NAME versionCode=$CURRENT_CODE)"
            break
          done

          if [ "$ATTEMPT" -ge "$MAX_ATTEMPTS" ]; then
            echo "::error::Hit $MAX_ATTEMPTS tag-push attempts. CI may be overwhelmed; check Actions for concurrent runs."
            exit 1
          fi
        env:
          TAG: ${{ env.tag }}
          VERSION_NAME: ${{ env.version_name }}
          VERSION_CODE: ${{ env.version_code }}

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tamiva-app-release-apk-${{ env.tag }}
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Upload Flutter Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log-apk-${{ env.tag }}
          path: flutter_app/flutter-build.log
          if-no-files-found: ignore