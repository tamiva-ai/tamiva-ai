name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .github/flutter-version

      - name: Verify environment
        run: |
          flutter --version
          java -version

      - name: Clean stale build artifacts
        working-directory: flutter_app
        run: |
          rm -rf .dart_tool build
          rm -rf android/.gradle android/build android/app/build

      - name: Install dependencies
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate app icon
        working-directory: flutter_app
        run: dart run flutter_launcher_icons

      - name: Build with Gradle (Full Stacktrace)
        working-directory: flutter_app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --info

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tamiva-app-release
          path: flutter_app/build/app/outputs/flutter-apk/app-release.apk