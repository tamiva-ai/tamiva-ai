# Build Android AAB (Play Store upload format).
#
# Adds a parallel job to the existing build-apk.yml workflow: this one
# produces app-release.aab and uploads it as a separate GitHub Actions
# artifact. The existing build-apk.yml still produces APK for sideload
# / Firebase App Distribution.
#
# Triggers:
#   - push to main (runs alongside the APK build)
#   - manual dispatch (Actions tab -> Run workflow)
#
# Required secrets (Settings -> Secrets and variables -> Actions):
#   ANDROID_KEYSTORE_BASE64  base64-encoded contents of tamiva-upload.jks
#   ANDROID_KEYSTORE_PASSWORD storepass (from key.properties)
#   ANDROID_KEY_ALIAS         tamiva-upload (the alias in your keystore)
#   ANDROID_KEY_PASSWORD      keypass (from key.properties)
#
# The keystore is base64-encoded because GitHub Actions secrets cannot
# accept binary file uploads. See scripts/encode-keystore.ps1 for the
# encoding helper.

name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build-aab:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .github/flutter-version

      - name: Clean stale build artifacts
        working-directory: flutter_app
        run: |
          rm -rf .dart_tool build
          rm -rf android/.gradle android/build android/app/build

      # Scaffold the android/ folder if missing. Idempotent — if your
      # repo already has android/app/src/main/AndroidManifest.xml, this
      # is a no-op and we skip the regeneration.
      - name: Scaffold native Android project (only on first run)
        working-directory: flutter_app
        run: |
          if [ ! -f android/app/src/main/AndroidManifest.xml ]; then
            flutter create . --platforms=android --org com.tamiva
          else
            echo "android/app/src/main/AndroidManifest.xml already present - skipping flutter create."
          fi

      # Patch the manifest with the permissions Tamiva actually needs.
      # Idempotent: skips lines that are already present.
      - name: Ensure permissions and queries
        working-directory: flutter_app
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          for perm in "android.permission.INTERNET" \
                      "android.permission.ACCESS_NETWORK_STATE" \
                      "android.permission.CAMERA" \
                      "android.permission.READ_EXTERNAL_STORAGE:maxSdkVersion=32" \
                      "android.permission.WRITE_EXTERNAL_STORAGE:maxSdkVersion=28" \
                      "android.permission.READ_MEDIA_IMAGES" \
                      "android.permission.READ_MEDIA_VIDEO" \
                      "android.permission.POST_NOTIFICATIONS"; do
            KEY="${perm%%:*}"
            TAIL="${perm#*:}"
            if [ "$KEY" = "$perm" ]; then
              NEEDLE="$KEY"
              INSERT="    <uses-permission android:name=\"$KEY\"/>"
            else
              NEEDLE="$KEY\" android:$TAIL"
              INSERT="    <uses-permission android:name=\"$KEY\" android:$TAIL/>"
            fi
            if ! grep -q "$NEEDLE" "$MANIFEST"; then
              sed -i "/<manifest /a\\$INSERT" "$MANIFEST"
            fi
          done
          if ! grep -q "<queries>" "$MANIFEST"; then
            sed -i '/<\/manifest>/i\    <queries>\n        <intent>\n            <action android:name="android.intent.action.PROCESS_TEXT" />\n            <data android:mimeType="text/plain" />\n        </intent>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="https" />\n        </intent>\n        <intent>\n            <action android:name="android.intent.action.VIEW" />\n            <data android:scheme="http" />\n        </intent>\n    </queries>' "$MANIFEST"
          fi

      # Brand the launcher and the app label.
      - name: Generate app icon
        working-directory: flutter_app
        run: dart run flutter_launcher_icons

      - name: Set app display name to Tamiva
        working-directory: flutter_app
        run: |
          sed -i 's/android:label="[^"]*"/android:label="Tamiva"/' android/app/src/main/AndroidManifest.xml

      # Decode the keystore and write key.properties for Gradle to
      # pick up. The CI never sees the password in plaintext logs
      # because we redirect via env vars and the file is .gitignored.
      - name: Decode keystore and write key.properties
        working-directory: flutter_app/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          # Decode the keystore to the path that key.properties points at
          # (tamiva-upload.jks relative to flutter_app/android/, the cwd of
          # this step). This way the file in your repo and the file on the
          # runner agree, and a single key.properties works in both
          # environments.
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > tamiva-upload.jks
          echo "Keystore bytes: $(wc -c < tamiva-upload.jks)"
          cat > key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=tamiva-upload.jks
          EOF
          chmod 600 key.properties tamiva-upload.jks

      # Ensure key.properties is gitignored so it never gets committed.
      - name: Ensure key.properties is gitignored
        working-directory: flutter_app/android
        run: |
          if ! grep -q '^key\.properties$' .gitignore 2>/dev/null; then
            printf '\nkey.properties\n' >> .gitignore
          fi

      # Wire signingConfigs.release + buildTypes.release in app/build.gradle.
      # Idempotent — only patches if not already present.
      - name: Wire release signing
        working-directory: flutter_app/android
        run: |
          GRADLE=app/build.gradle.kts
          if [ ! -f "$GRADLE" ]; then GRADLE=app/build.gradle; fi
          if ! grep -q 'signingConfigs' "$GRADLE"; then
            echo "::error::$GRADLE has no signingConfigs block. Add the snippet from AAB_BUILD_GUIDE.md Phase 4.2 manually."
            exit 1
          fi
          if ! grep -q 'signingConfig' "$GRADLE"; then
            echo "::error::signingConfigs block exists in $GRADLE but buildTypes.release is not pointing at it. See AAB_BUILD_GUIDE.md Phase 4.2."
            exit 1
          fi

      - name: Install Flutter dependencies
        working-directory: flutter_app
        run: flutter pub get

      # Build the AAB. Produces build/app/outputs/bundle/release/app-release.aab.
      - name: Build AAB
        working-directory: flutter_app
        run: flutter build appbundle --release

      # Upload the AAB as a downloadable artifact. The artifact name
      # includes the commit SHA so you can correlate with a specific push.
      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tamiva-app-release-aab-${{ github.sha }}
          path: flutter_app/build/app/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 90

      # Convenience summary. Lets you see at a glance which SHA the
      # artifact came from and the version code baked into the AAB.
      - name: Summarize
        run: |
          echo "## AAB build summary" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow: \`${{ github.workflow }}\`" >> $GITHUB_STEP_SUMMARY
          ls -la flutter_app/build/app/outputs/bundle/release/app-release.aab >> $GITHUB_STEP_SUMMARY 2>/dev/null || true