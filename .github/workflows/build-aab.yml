name: Build AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Provision a known-good Android SDK + NDK + CMake. The preinstalled SDK
      # on ubuntu-latest runners is missing ninja under cmake/3.22.1, which
      # causes :jni:externalNativeBuildCleanRelease to fail with
      # "A problem occurred starting process 'command '.../bin/ninja''".
      #
      # `packages:` MUST be a single-line, space-separated string. YAML block
      # scalars (`|`) preserve newlines and cause sdkmanager to interpret the
      # whole block as one package name.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: "11076708"
          packages: "platform-tools platforms-android-35 build-tools;35.0.0 ndk;27.0.12077973 cmake;3.22.1"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .github/flutter-version
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Show Android Files
        working-directory: flutter_app/android
        run: |
          pwd
          ls -la
          ls -la gradle/wrapper

      # No `clean` step - bundleRelease overwrites outputs and the fresh-clean
      # task can fail before AGP has a chance to download/provision the SDK
      # tools it needs.
      - name: Build with Gradle
        working-directory: flutter_app/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            --no-daemon \
            --console=plain \
            --warning-mode=summary \
            2>&1 | tee gradle-build.log
          status=${PIPESTATUS[0]}
          echo "::notice::Gradle exit status: $status"
          if [ "$status" -ne 0 ]; then
            echo "===== FAILURE TAIL (last 200 lines of gradle-build.log) ====="
            tail -n 200 gradle-build.log
            echo "===== END FAILURE TAIL ====="
          fi
          exit "$status"

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tamiva-release-aab
          path: flutter_app/build/app/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload Gradle Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: flutter_app/android/gradle-build.log
          if-no-files-found: ignore