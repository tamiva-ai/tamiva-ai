name: Build AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .github/flutter-version
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Show Android Files
        working-directory: flutter_app/android
        run: |
          pwd
          ls -la
          ls -la gradle/wrapper

      - name: Build with Gradle (Debug)
        working-directory: flutter_app/android
        run: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew bundleRelease --stacktrace --info

      - name: Upload Gradle Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs
          path: |
            flutter_app/android/**/*.log
            flutter_app/android/build/reports/**
            flutter_app/build/reports/**
          if-no-files-found: ignore

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tamiva-release-aab
          path: flutter_app/build/app/outputs/bundle/release/*.aab
          if-no-files-found: error