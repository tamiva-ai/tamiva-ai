name: Build Android AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .github/flutter-version

      - name: Verify environment
        run: |
          echo "===== CURRENT DIRECTORY ====="
          pwd
          echo

          echo "===== ROOT ====="
          ls -la
          echo

          echo "===== flutter_app ====="
          ls -la flutter_app || true
          echo

          echo "===== flutter_app/android ====="
          ls -la flutter_app/android || true
          echo

          echo "===== Flutter ====="
          flutter --version
          echo

          echo "===== Java ====="
          java -version

      - name: Clean project
        working-directory: flutter_app
        run: |
          flutter clean
          rm -rf .dart_tool
          rm -rf build
          rm -rf android/.gradle
          rm -rf android/build
          rm -rf android/app/build

      - name: Get packages
        working-directory: flutter_app
        run: flutter pub get

      - name: Generate launcher icons
        working-directory: flutter_app
        run: dart run flutter_launcher_icons

      - name: Verify Gradle Wrapper
        working-directory: flutter_app/android
        run: |
          pwd
          ls -la
          test -f gradlew
          chmod +x gradlew
          ./gradlew --version

      - name: Build AAB with full Gradle stacktrace
        working-directory: flutter_app/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            --stacktrace \
            --info \
            --warning-mode all

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tamiva-app-release
          path: flutter_app/build/app/outputs/bundle/release/*.aab