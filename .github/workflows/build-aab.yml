name: Build AAB

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: flutter_app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .github/flutter-version
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Get Dependencies
        run: flutter pub get

      - name: Show Android Files
        working-directory: flutter_app/android
        run: |
          pwd
          ls -la
          ls -la gradle/wrapper

      # Capture the full Gradle log to a file so it's available as an artifact,
      # but keep the live console output quiet. On failure we still print the
      # last ~200 lines so the cause is visible without paging through
      # thousands of worker frames.
      - name: Build with Gradle
        working-directory: flutter_app/android
        run: |
          chmod +x gradlew
          ./gradlew clean bundleRelease \
            --no-daemon \
            --console=plain \
            --warning-mode=summary \
            2>&1 | tee gradle-build.log
          status=${PIPESTATUS[0]}
          echo "::notice::Gradle exit status: $status"
          if [ "$status" -ne 0 ]; then
            echo "===== FAILURE TAIL (last 200 lines of gradle-build.log) ====="
            tail -n 200 gradle-build.log
            echo "===== END FAILURE TAIL ====="
          fi
          exit "$status"

      - name: Upload AAB
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tamiva-release-aab
          path: flutter_app/build/app/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Upload Gradle Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-log
          path: flutter_app/android/gradle-build.log
          if-no-files-found: ignore