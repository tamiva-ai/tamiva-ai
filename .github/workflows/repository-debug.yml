name: Repository Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Show repository
        run: |
          echo "PWD"
          pwd

          echo
          echo "FILES"
          find .

          echo
          echo "GRADLE"
          find . -name gradlew

          echo
          echo "ANDROID"
          ls -la flutter_app/android || true