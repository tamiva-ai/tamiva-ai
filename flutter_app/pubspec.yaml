name: tamiva_app
description: Tamiva self-serve brand asset generator (logo, video, carousel).
publish_to: "none"
version: 0.2.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  image_picker: ^1.1.2
  provider: ^6.1.2
  cached_network_image: ^3.4.1
  mime: ^1.0.5
  http_parser: ^4.0.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  lottie: ^3.1.2
  gal: ^2.3.0
  razorpay_flutter: ^1.3.7
  # v36 additions.
  uuid: ^4.5.1                                  # Idempotency-Key generation
  shared_preferences: ^2.3.2                    # token + draft persistence
  connectivity_plus: ^6.0.5                     # offline detection (S2.7)
  video_player: ^2.9.2                          # in-app film playback (S2.11)
  share_plus: ^10.1.2                           # save-all/share carousel (S3.17)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/hero/
    - assets/lottie/
